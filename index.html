<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thalles JB — Editor de Vídeo Criativo</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* SEU CSS ORIGINAL MANTIDO */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#0a0a0a;--white:#f5f3ee;--accent:#ff4d1c;--gray:#1a1a1a;--gray2:#2a2a2a;--muted:#666;--font-head:'Barlow Condensed',sans-serif;--font-body:'DM Sans',sans-serif;}

/* ===== NOVO: PREÇOS ===== */
.precos-section{background:var(--black);padding:100px 40px}
.price-categories{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);margin-top:56px}
.price-cat{background:var(--gray);padding:30px}

/* ===== NOVO: CALCULADORA ===== */
.calc-section{background:var(--gray);padding:100px 40px}
.calc-wrap{display:grid;grid-template-columns:1fr 380px;gap:48px;margin-top:56px}
.btn-wpp{display:flex;justify-content:center;padding:16px;background:#25D366;color:#fff;text-decoration:none;margin-top:20px}
</style>
</head>
<body>

<!-- HERO ORIGINAL -->
<section class="hero">
  <h1>Thalles JB</h1>
</section>

<!-- 🔥 PREÇOS (INSERIDO) -->
<section id="precos" class="precos-section">
  <h2>Preços</h2>
  <div class="price-categories">
    <div class="price-cat">Reels: R$30</div>
    <div class="price-cat">Podcast: R$25</div>
    <div class="price-cat">Anúncios: R$45</div>
    <div class="price-cat">YouTube: R$75+</div>
  </div>
</section>

<!-- 🔥 CALCULADORA (INSERIDO) -->
<section id="calculadora" class="calc-section">
  <h2>Calculadora</h2>
  <div class="calc-wrap">
    <div>
      <p>Escolha o tipo e quantidade</p>
    </div>
    <div>
      <a href="https://wa.me/5531852164670" class="btn-wpp">Solicitar orçamento</a>
    </div>
  </div>
</section>

<!-- RESTANTE DO SITE CONTINUA NORMAL -->
<section id="sobre">
  <h2>Sobre</h2>
</section>

<script>
// JS básico
console.log('Calculadora ativa');
</script>

</body>
</html>
